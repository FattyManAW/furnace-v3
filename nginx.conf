server {
    listen 8031;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # v3 API: orders, kanban, stats, sync → v3 container
    location /api/v1/orders {
        proxy_pass http://api:8002;
        proxy_set_header Host $host;
    }
    location /api/v1/kanban {
        proxy_pass http://api:8002;
        proxy_set_header Host $host;
    }
    location /api/v1/stats {
        proxy_pass http://api:8002;
        proxy_set_header Host $host;
    }
    location /api/v1/sync {
        proxy_pass http://api:8002;
        proxy_set_header Host $host;
    }

    # v2 fallback: reports, schedule, molds, kilns, dashboard → v2 via host
    location /api/ {
        proxy_pass http://100.107.36.80:8002;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:8002;
    }
}