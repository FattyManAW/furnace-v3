services:
  api:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: furnace-v3:latest
    container_name: furnace-v3-api
    ports:
      - "${PORT:-8005}:8002"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: furnace-v3-nginx
    ports:
      - "8031:8031"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped